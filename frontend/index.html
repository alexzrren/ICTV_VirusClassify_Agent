<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICTV Virus Classifier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f4f6fa; }
    .brand { color: #1a6b3a; font-weight: 700; }
    #reasoning-box {
      background: #1e1e2e; color: #cdd6f4; font-family: monospace;
      font-size: 0.82rem; border-radius: 8px; padding: 1rem;
      max-height: 350px; overflow-y: auto;
    }
    .tax-badge { font-size: 0.78rem; margin: 2px; }
    .confidence-High   { background: #198754; color: white; }
    .confidence-Medium { background: #ffc107; color: #212529; }
    .confidence-Low    { background: #dc3545; color: white; }
    .confidence-Unknown{ background: #6c757d; color: white; }
    .step-line { margin: 0; padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
    .step-tool { color: #89b4fa; }
    .step-result { color: #a6e3a1; }
    .step-error { color: #f38ba8; }
    #result-section { display: none; }
    .evidence-card { font-size: 0.85rem; }
    .novel-badge { background: #dc3545; color: white; }
    .cache-badge { background: #0d6efd; color: white; }
    .history-item { cursor: pointer; padding: 6px 8px; border-radius: 4px; margin-bottom: 4px; border: 1px solid #dee2e6; }
    .history-item:hover { background: #e9ecef; }
    .history-item .hi-id { font-weight: 600; color: #1a6b3a; }
    .history-item .hi-tax { color: #495057; }
    .history-item .hi-time { color: #6c757d; font-size: 0.75rem; }
    /* Family Criteria */
    .criteria-level { border-left: 3px solid #dee2e6; padding-left: 12px; margin-bottom: 12px; }
    .criteria-level.species { border-color: #198754; }
    .criteria-level.genus { border-color: #0d6efd; }
    .criteria-level.subfamily { border-color: #6f42c1; }
    .criteria-level-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .criteria-level.species .criteria-level-label { color: #198754; }
    .criteria-level.genus .criteria-level-label { color: #0d6efd; }
    .criteria-level.subfamily .criteria-level-label { color: #6f42c1; }
    .criteria-tag { display: inline-block; font-size: 0.72rem; padding: 1px 6px; border-radius: 3px; margin: 1px 2px; }
    .criteria-tag.method { background: #e8f5e9; color: #2e7d32; }
    .criteria-tag.region { background: #e3f2fd; color: #1565c0; }
    .criteria-tag.threshold { background: #fff3e0; color: #e65100; font-weight: 600; }
    .criteria-desc { font-size: 0.8rem; color: #495057; margin-top: 4px; line-height: 1.4; }
    .criteria-note { font-size: 0.78rem; color: #6c757d; font-style: italic; margin-top: 8px; border-top: 1px solid #eee; padding-top: 6px; }
  </style>
</head>
<body>
<nav class="navbar navbar-light bg-white border-bottom shadow-sm mb-4">
  <div class="container">
    <span class="navbar-brand fs-5 brand">🦠 ICTV Virus Classifier</span>
    <span class="text-muted small">Sequence classification by ICTV official demarcation criteria</span>
  </div>
</nav>

<div class="container pb-5">
  <div class="row g-4">

    <!-- Input Panel -->
    <div class="col-lg-5">
      <div class="card shadow-sm">
        <div class="card-header bg-white fw-semibold">Submit Sequence</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label small text-muted">FASTA sequence (nucleotide or protein)</label>
            <textarea id="fasta-input" class="form-control font-monospace"
              rows="10" placeholder=">MyVirus_query&#10;ATGCGATCGATCGA..."></textarea>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-5">
              <label class="form-label small text-muted">Sequence type</label>
              <select id="seq-type" class="form-select form-select-sm">
                <option value="auto">Auto-detect</option>
                <option value="nt">Nucleotide</option>
                <option value="aa">Amino acid</option>
              </select>
            </div>
            <div class="col-4">
              <label class="form-label small text-muted">Family (optional)</label>
              <input id="family-hint" type="text" class="form-control form-control-sm"
                placeholder="e.g. Coronaviridae" />
            </div>
            <div class="col-3">
              <label class="form-label small text-muted">Max steps</label>
              <input id="max-steps" type="number" class="form-control form-control-sm" value="20" min="5" max="40" />
            </div>
          </div>
          <button id="submit-btn" class="btn btn-success w-100" onclick="submitClassify()">
            Classify Sequence
          </button>
          <div id="submit-spinner" class="text-center mt-3" style="display:none">
            <div class="spinner-border text-success" role="status"></div>
            <p class="small text-muted mt-1">Agent is reasoning…</p>
          </div>
        </div>
      </div>

      <!-- Family Lookup -->
      <div class="card shadow-sm mt-3">
        <div class="card-header bg-white fw-semibold">Family Criteria Lookup</div>
        <div class="card-body">
          <div class="input-group input-group-sm">
            <input id="family-input" type="text" class="form-control"
              placeholder="e.g. Coronaviridae" />
            <button class="btn btn-outline-success" onclick="lookupFamily()">Look up</button>
          </div>
          <div id="family-result" class="mt-2 small" style="display:none"></div>
        </div>
      </div>

      <!-- History -->
      <div class="card shadow-sm mt-3">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
          <span class="fw-semibold">History</span>
          <div>
            <button class="btn btn-sm btn-outline-danger me-1" onclick="clearAllHistory()">Clear All</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="loadHistory()">Refresh</button>
          </div>
        </div>
        <div class="card-body p-2">
          <div id="history-list" class="small" style="max-height:250px;overflow-y:auto">
            <span class="text-muted">Loading...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Output Panel -->
    <div class="col-lg-7">

      <!-- Reasoning stream -->
      <div class="card shadow-sm mb-3">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
          <span class="fw-semibold">Agent Reasoning</span>
          <div class="d-flex align-items-center gap-2">
            <button id="cancel-btn" class="btn btn-sm btn-outline-danger" style="display:none"
              onclick="cancelJob()">&#9632; Stop</button>
            <span id="status-badge" class="badge bg-secondary">Idle</span>
          </div>
        </div>
        <div class="card-body p-2">
          <div id="reasoning-box"><span class="text-muted small">Steps will appear here…</span></div>
        </div>
      </div>

      <!-- Classification result -->
      <div id="result-section" class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
          <span class="fw-semibold">Classification Result</span>
          <div>
            <span id="confidence-badge" class="badge me-2">—</span>
            <span id="novel-badge" class="badge novel-badge" style="display:none">Potential Novel Species</span>
          </div>
        </div>
        <div class="card-body">
          <h6 class="text-muted small mb-2">Taxonomy</h6>
          <div id="taxonomy-badges" class="mb-3"></div>

          <h6 class="text-muted small mb-2">Evidence</h6>
          <div id="evidence-list" class="mb-3"></div>

          <h6 class="text-muted small mb-2">Reasoning Summary</h6>
          <p id="reasoning-summary" class="small text-muted"></p>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const API = '';
let _currentJobId = null;

async function cancelJob() {
  if (!_currentJobId) return;
  const btn = document.getElementById('cancel-btn');
  btn.disabled = true;
  btn.textContent = 'Stopping…';
  try {
    await fetch(`${API}/cancel/${_currentJobId}`, { method: 'POST' });
  } catch(e) {}
}

async function submitClassify() {
  const fasta = document.getElementById('fasta-input').value.trim();
  if (!fasta) { alert('Please enter a FASTA sequence.'); return; }

  resetUI();
  setStatus('Running', 'warning');
  document.getElementById('submit-spinner').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('cancel-btn').style.display = 'inline-block';
  document.getElementById('cancel-btn').disabled = false;
  document.getElementById('cancel-btn').textContent = '■ Stop';

  let jobId;
  try {
    const res = await fetch(`${API}/classify`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        fasta,
        sequence_type: document.getElementById('seq-type').value,
        max_steps: parseInt(document.getElementById('max-steps').value) || 20,
        family_hint: document.getElementById('family-hint').value.trim(),
      }),
    });
    const data = await res.json();
    jobId = data.job_id;
    _currentJobId = jobId;

    // Cache hit — show result immediately
    if (data.cached) {
      appendStep('[Cache] Identical sequence found in local cache — returning previous result.', 'tool');
      const cached = await fetch(`${API}/result/${jobId}`).then(r => r.json());
      if (cached.result) showResult(cached.result, true);
      setStatus('Done (cached)', 'success');
      done();
      loadHistory();
      return;
    }
  } catch (e) {
    appendStep(`[ERROR] Failed to submit: ${e}`, 'error');
    done();
    return;
  }

  // Connect to SSE stream
  const es = new EventSource(`${API}/stream/${jobId}`);
  es.onmessage = (evt) => {
    const d = JSON.parse(evt.data);
    if (d.step) {
      const cls = d.step.includes('[Tool]') ? 'tool'
                : d.step.includes('[ERROR]') ? 'error' : 'result';
      appendStep(d.step, cls);
    }
    if (d.status === 'done') {
      es.close();
      if (d.result) showResult(d.result);
      setStatus('Done', 'success');
      done();
      loadHistory();
    } else if (d.status === 'error') {
      es.close();
      const cancelled = d.error === 'Cancelled by user';
      appendStep(cancelled ? '[Stopped] Classification cancelled by user.' : `[ERROR] ${d.error || 'Unknown error'}`,
                 cancelled ? 'tool' : 'error');
      setStatus(cancelled ? 'Stopped' : 'Error', cancelled ? 'secondary' : 'danger');
      done();
      if (cancelled) loadHistory();
    }
  };
  es.onerror = () => {
    es.close();
    // Fallback: poll
    pollResult(jobId);
  };
}

async function pollResult(jobId) {
  for (let i = 0; i < 120; i++) {
    await sleep(2000);
    try {
      const res = await fetch(`${API}/result/${jobId}`);
      const data = await res.json();
      if (data.status === 'done') {
        if (data.result) showResult(data.result);
        setStatus('Done', 'success');
        done();
        return;
      } else if (data.status === 'error') {
        appendStep(`[ERROR] ${data.error}`, 'error');
        setStatus('Error', 'danger');
        done();
        return;
      }
    } catch(e) {}
  }
  setStatus('Timeout', 'danger');
  done();
}

function showResult(result, cached = false) {
  document.getElementById('result-section').style.display = 'block';

  // Confidence badge
  const conf = result.confidence || 'Unknown';
  const cb = document.getElementById('confidence-badge');
  cb.textContent = cached ? `${conf} (cached)` : conf;
  cb.className = cached ? 'badge cache-badge' : `badge confidence-${conf}`;

  // Novel species
  if (result.novel_species) {
    document.getElementById('novel-badge').style.display = 'inline-block';
  }

  // Taxonomy badges
  const tax = result.taxonomy || {};
  const levels = [
    ['Realm', tax.realm], ['Kingdom', tax.kingdom], ['Phylum', tax.phylum],
    ['Class', tax.class], ['Order', tax.order], ['Family', tax.family],
    ['Subfamily', tax.subfamily], ['Genus', tax.genus], ['Species', tax.species],
  ];
  const container = document.getElementById('taxonomy-badges');
  container.innerHTML = levels.filter(([,v]) => v)
    .map(([label, val]) =>
      `<span class="badge bg-secondary tax-badge me-1 mb-1">${label}: <strong>${val}</strong></span>`
    ).join('');

  // Evidence
  const evList = document.getElementById('evidence-list');
  if (result.evidence && result.evidence.length > 0) {
    evList.innerHTML = result.evidence.map(e => `
      <div class="card evidence-card mb-1">
        <div class="card-body py-1 px-2">
          <strong>${e.method}</strong> | Region: ${e.region}<br/>
          Value: <code>${e.value}</code> / Threshold: <code>${e.threshold}</code><br/>
          <span class="text-muted">${e.conclusion}</span>
        </div>
      </div>
    `).join('');
  } else {
    evList.innerHTML = '<span class="text-muted small">No structured evidence recorded.</span>';
  }

  // Reasoning summary ��� always show if available
  const reasoning = result.reasoning || buildReasoningSummary(result);
  document.getElementById('reasoning-summary').textContent = reasoning;
}

async function lookupFamily() {
  const name = document.getElementById('family-input').value.trim();
  if (!name) return;
  const el = document.getElementById('family-result');
  el.style.display = 'block';
  el.innerHTML = '<span class="text-muted">Loading...</span>';
  try {
    const res = await fetch(`${API}/family/${encodeURIComponent(name)}`);
    if (!res.ok) {
      const d = await res.json();
      el.innerHTML = `<span class="text-danger">${d.detail || 'Not found'}</span>`;
      return;
    }
    const data = await res.json();
    el.innerHTML = renderCriteria(data);
  } catch(e) {
    el.innerHTML = `<span class="text-danger">${e}</span>`;
  }
}

function renderCriteria(data) {
  let html = `<div class="mb-1"><strong>${data.family}</strong>`;
  if (data.reference_gene) html += ` <span class="criteria-tag region">ref: ${data.reference_gene}</span>`;
  html += `</div>`;

  const levels = [
    { key: 'species_demarcation', label: 'Species', cls: 'species' },
    { key: 'genus_demarcation', label: 'Genus', cls: 'genus' },
    { key: 'subfamily_demarcation', label: 'Subfamily', cls: 'subfamily' },
  ];

  let hasAny = false;
  for (const lv of levels) {
    const d = data[lv.key];
    if (!d) continue;
    hasAny = true;
    html += `<div class="criteria-level ${lv.cls}">`;
    html += `<div class="criteria-level-label">${lv.label} demarcation</div>`;

    // Method
    if (d.primary_method) html += `<span class="criteria-tag method">${d.primary_method}</span>`;

    // Regions
    if (d.regions && d.regions.length)
      for (const r of d.regions) html += `<span class="criteria-tag region">${r}</span>`;

    // Thresholds
    if (d.thresholds && Object.keys(d.thresholds).length) {
      html += `<div style="margin-top:3px">`;
      for (const [k, v] of Object.entries(d.thresholds)) {
        const label = k.replace(/_/g, ' ');
        html += `<span class="criteria-tag threshold">${label}: ${v}</span> `;
      }
      html += `</div>`;
    }

    // Description
    if (d.description)
      html += `<div class="criteria-desc">${d.description}</div>`;

    html += `</div>`;
  }

  if (!hasAny) {
    html += `<div class="text-muted small mt-1">No explicit demarcation criteria available for this family.</div>`;
  }

  if (data.notes) html += `<div class="criteria-note">${data.notes}</div>`;
  return html;
}

function buildReasoningSummary(result) {
  const parts = [];
  const tax = result.taxonomy || {};
  if (tax.family) parts.push(`Family: ${tax.family}`);
  if (tax.genus) parts.push(`Genus: ${tax.genus}`);
  if (tax.species && tax.species !== 'novel/uncertain')
    parts.push(`Species: ${tax.species}`);
  if (result.novel_species) parts.push('Potential novel species');
  if (result.evidence && result.evidence.length > 0) {
    for (const e of result.evidence) {
      if (e.value != null && e.threshold != null)
        parts.push(`${e.method}: ${e.value} (threshold ${e.threshold})`);
    }
  }
  if (result.confidence) parts.push(`Confidence: ${result.confidence}`);
  return parts.length > 0 ? parts.join('. ') + '.' : 'Classification complete.';
}

function appendStep(text, cls = '') {
  const box = document.getElementById('reasoning-box');
  if (box.firstChild && box.firstChild.classList && box.firstChild.classList.contains('text-muted')) {
    box.innerHTML = '';
  }
  const p = document.createElement('p');
  p.className = `step-line step-${cls}`;
  const LIMIT = 800;
  if (text.length > LIMIT) {
    const preview = text.slice(0, LIMIT);
    const rest = text.slice(LIMIT);
    const span = document.createElement('span');
    span.textContent = preview;
    const toggle = document.createElement('a');
    toggle.href = '#';
    toggle.style.marginLeft = '4px';
    toggle.style.fontSize = '0.75rem';
    toggle.style.color = '#89b4fa';
    toggle.textContent = `… [+${rest.length} chars, click to expand]`;
    toggle.onclick = (e) => {
      e.preventDefault();
      span.textContent = text;
      toggle.remove();
    };
    p.appendChild(span);
    p.appendChild(toggle);
  } else {
    p.textContent = text;
  }
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;
}

function setStatus(label, type) {
  const el = document.getElementById('status-badge');
  el.textContent = label;
  el.className = `badge bg-${type}`;
}

function resetUI() {
  document.getElementById('reasoning-box').innerHTML = '<span class="text-muted small">Steps will appear here…</span>';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('novel-badge').style.display = 'none';
  document.getElementById('family-result').style.display = 'none';
}

function done() {
  document.getElementById('submit-spinner').style.display = 'none';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('cancel-btn').style.display = 'none';
  _currentJobId = null;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── History ──────────────────────────────────────────────────────
async function loadHistory() {
  const el = document.getElementById('history-list');
  try {
    const res = await fetch(`${API}/history?limit=20`);
    const data = await res.json();
    const items = data.history || [];
    if (items.length === 0) {
      el.innerHTML = '<span class="text-muted">No previous classifications.</span>';
      return;
    }
    el.innerHTML = items.map(h => {
      const tax = [h.family, h.genus, h.species].filter(Boolean).join(' > ') || '—';
      const time = h.created_at ? new Date(h.created_at).toLocaleString() : '';
      return `<div class="history-item d-flex justify-content-between align-items-start">
        <div style="flex:1;cursor:pointer" onclick="loadCached('${h.seq_hash}')">
          <div class="hi-id">${escHtml(h.query_id || '?')}</div>
          <div class="hi-tax">${escHtml(tax)}</div>
          <div class="hi-time">${escHtml(time)} &middot; ${h.confidence || '?'}</div>
        </div>
        <button class="btn btn-sm btn-outline-danger border-0 p-0 ms-1" style="font-size:0.7rem;line-height:1"
          onclick="event.stopPropagation();deleteHistory('${h.seq_hash}')" title="Delete">&times;</button>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<span class="text-muted">Failed to load history.</span>';
  }
}

async function loadCached(hash) {
  resetUI();
  setStatus('Loading cached result...', 'info');
  try {
    const res = await fetch(`${API}/cache/${hash}`);
    if (!res.ok) { setStatus('Cache miss', 'warning'); return; }
    const result = await res.json();
    appendStep('[Cache] Loaded from history.', 'tool');
    showResult(result, true);
    setStatus('Done (cached)', 'success');
  } catch(e) {
    appendStep(`[ERROR] ${e}`, 'error');
    setStatus('Error', 'danger');
  }
}

async function deleteHistory(hash) {
  try {
    await fetch(`${API}/cache/${hash}`, {method: 'DELETE'});
    loadHistory();
  } catch(e) {}
}

async function clearAllHistory() {
  if (!confirm('Delete all cached classification results?')) return;
  try {
    await fetch(`${API}/cache`, {method: 'DELETE'});
    loadHistory();
  } catch(e) {}
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Load history on page load
document.addEventListener('DOMContentLoaded', loadHistory);
</script>
</body>
</html>
